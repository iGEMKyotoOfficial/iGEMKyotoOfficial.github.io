name: Deploy redirect to GitHub Pages

# このリポジトリ（組織ルート igemkyotoofficial.github.io）は、
# 正規サイト https://igemkyotoofficial.github.io/homepage/ への
# リダイレクトのみを配信する。サイト本体は iGEMKyotoOfficial/homepage repo。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload redirect artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
